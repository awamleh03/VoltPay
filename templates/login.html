<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <style>
        body { background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background-color: #38bdf8; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .register-link { display: block; margin-top: 25px; color: #fbbf24; text-decoration: underline; font-size: 16px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>تسجيل الدخول</h1>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول</button>
        </form>
        <a href="/register" class="register-link">إنشاء حساب جديد</a>
    </div>
</body>
</html>
