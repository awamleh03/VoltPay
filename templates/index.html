<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VoltPay | تحويل بأمان</title>
    <style>
        body { background-color: #0b172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; padding: 50px; margin: 0; }
        .hero { margin-bottom: 50px; }
        .hero h1 { color: #5bc0de; font-size: 3.5em; margin: 0; }
        /* تصميم "عمولة صفر" الفخم */
        .zero-fee { color: #f0ad4e; font-size: 2em; font-weight: bold; margin: 10px 0; border: 2px solid #f0ad4e; display: inline-block; padding: 5px 20px; border-radius: 50px; }
        .hero p { font-size: 1.3em; color: #a0aec0; }

        .features-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px; }
        .card { background: #15253e; padding: 25px; border-radius: 15px; width: 250px; border: 1px solid #2d3748; }
        .card h3 { color: #5bc0de; }

        .cta-btn { background-color: #5bc0de; color: #0b172a; padding: 15px 40px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.2em; display: inline-block; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>VoltPay</h1>
        <div class="zero-fee">عمولة 0%</div>
        <p>أفضل منصة للتحويل المالي الرقمي، مكانك المفضل لراحة بالك.</p>
    </div>

    <div class="features-grid">
        <div class="card">
            <h3>تحويل فوري</h3>
            <p>أموالك تصل في ثوانٍ معدودة.</p>
        </div>
        <div class="card">
            <h3>أمان مطلق</h3>
            <p>تشفير عالي المستوى لبياناتك.</p>
        </div>
        <div class="card">
            <h3>دعم فني 24/7</h3>
            <p>جاهزون لخدمتك في أي وقت.</p>
        </div>
    </div>

    <br>
    <a href="/login" class="cta-btn">ابدأ الآن</a>
</body>
</html>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
